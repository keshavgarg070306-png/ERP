# Server configuration
server.port=8080
server.servlet.context-path=/api

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:nexcore_erp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA settings
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Spring Actuator (Health Endpoint)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT Configuration Parameters
nexcore.jwt.secret=${JWT_SECRET:9a4f2c8d3e7b1a6c5d8e2f9a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f}
nexcore.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
nexcore.jwt.cookie-name=${JWT_COOKIE_NAME:token}
nexcore.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
nexcore.jwt.cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}

# CORS Configuration
nexcore.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Spring Mail configurations (SMTP Mocking)
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Enable Lombok log configuration
logging.level.com.nexcore.erp=INFO
logging.level.org.springframework.security=INFO
