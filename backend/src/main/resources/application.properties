# Server configuration
server.port=8080
server.servlet.context-path=/api

# Database configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:nexcore_erp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / H2 settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Spring Actuator (Health Endpoint)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT Configuration Parameters
nexcore.jwt.secret=9a4f2c8d3e7b1a6c5d8e2f9a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f
nexcore.jwt.expiration-ms=86400000
nexcore.jwt.cookie-name=token

# Spring Mail configurations (SMTP Mocking)
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Enable Lombok log configuration
logging.level.com.nexcore.erp=INFO
logging.level.org.springframework.security=INFO
