services:
  # Spring Boot Backend Web Service
  - type: web
    name: nexcore-erp-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: nexcore-erp-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: nexcore-erp-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: nexcore-erp-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_COOKIE_SECURE
        value: "true"
      - key: JWT_COOKIE_SAME_SITE
        value: None
      - key: CORS_ALLOWED_ORIGINS
        value: https://nexcore-erp-frontend.vercel.app,https://nexcore-erp-frontend-git-main-keshavgarg070306-pngs-projects.vercel.app

databases:
  - name: nexcore-erp-db
    plan: free
